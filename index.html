     index.html
========================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baking Roulette 🎲</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Baking Roulette 🎲</h1>

<p>
Spin and discover a random baked recipe!
</p>

<!-- =========================
     WHEEL
========================= -->

<div class="wheel-container">

  <div id="wheel">

    <span class="icon" style="top:20px;left:90px;">🍪</span>

    <span class="icon" style="top:60px;left:160px;">🍫</span>

    <span class="icon" style="top:140px;left:150px;">🍰</span>

    <span class="icon" style="top:180px;left:90px;">🧁</span>

    <span class="icon" style="top:140px;left:20px;">🍩</span>

    <span class="icon" style="top:60px;left:20px;">🥧</span>

  </div>

</div>

<!-- =========================
     SPIN BUTTON
========================= -->

<button onclick="spinRoulette()">
🎡 Spin
</button>

<!-- =========================
     AUDIO
========================= -->

<audio id="spin-sound" src="spinner.mp3"></audio>

<!-- =========================
     RECIPE CARD
========================= -->

<div class="card">

  <h2 id="recipe-name">
    Click Spin!
  </h2>

  <h3 id="recipe-type"></h3>

  <h4 id="recipe-temp"></h4>

  <h4 id="recipe-time"></h4>

  <!-- IMAGE -->

  <img
    id="recipe-image"
    src=""
    alt="Recipe Image"
  >

  <!-- INGREDIENTS -->

  <h4>Ingredients:</h4>

  <ul id="ingredients-list"></ul>

  <!-- STEPS -->

  <h4>Steps:</h4>

  <ol id="steps-list"></ol>

  <!-- TIMER -->

  <h4>Baking Timer:</h4>

  <div id="timer-display">
    00:00
  </div>

  <div class="timer-buttons">

    <button onclick="startTimer()">
      ▶ Start
    </button>

    <button onclick="pauseTimer()">
      ⏸ Pause
    </button>

    <button onclick="resetTimer()">
      🔄 Reset
    </button>

  </div>

  <!-- PRINT -->

  <button onclick="window.print()">
    🖨 Print Recipe
  </button>

</div>

<!-- =========================
     LAST UPDATED
========================= -->

<div id="last-updated"></div>

<script src="script.js"></script>

</body>
</html>
