<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Baking Roulette 🎲</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Baking Roulette 🎲</h1>

  <div class="wheel-container">
    <div id="wheel">
      <span class="icon">🍪</span>
      <span class="icon">🍪</span>
      <span class="icon">🍫</span>
      <span class="icon">🍰</span>
      <span class="icon">🍰</span>
      <span class="icon">🧁</span>
    </div>
  </div>

  <button onclick="spinRoulette()">Spin</button>

  <audio id="spin-sound" src="sounds/spin.mp3"></audio>

  <div class="card">
    <h2 id="recipe-name">Click Spin!</h2>
    <h3 id="recipe-type"></h3>
    <h4 id="recipe-temp"></h4>
    <h4 id="recipe-time"></h4>

    <img id="recipe-image" src="" alt="Recipe Image">

    <h4>Ingredients:</h4>
    <ul id="ingredients-list"></ul>

    <h4>Steps:</h4>
    <ol id="steps-list"></ol>

    <h4>Baking Timer:</h4>
    <div id="timer-display">00:00</div>

    <div class="timer-buttons">
      <button onclick="startTimer()">Start</button>
      <button onclick="pauseTimer()">Pause</button>
      <button onclick="resetTimer()">Reset</button>
    </div>

    <button onclick="window.print()">Print Recipe</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
